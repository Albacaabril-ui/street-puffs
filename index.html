
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Street Puffs</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
scroll-behavior:smooth;
}
body{
background:#090909;
color:white;
}
header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background:radial-gradient(circle at top,#111,#050505);
}
.logo{
font-size:4rem;
font-weight:900;
color:#00ffff;
text-shadow:0 0 20px #00ffff;
}
.subtitle{
margin-top:10px;
letter-spacing:3px;
color:#aaa;
}
.btn{
margin-top:40px;
padding:16px 38px;
background:#00ffff;
border:none;
border-radius:40px;
font-weight:700;
font-size:1rem;
cursor:pointer;
box-shadow:0 0 20px rgba(0,255,255,.5);
transition:.3s;
}
.btn:hover{
transform:scale(1.05);
}
.section{
padding:40px 20px;
max-width:1200px;
margin:auto;
}
.title{
font-size:2rem;
margin-bottom:25px;
color:#00ffff;
}
.categories{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-bottom:40px;
}
.category{
background:#121212;
border:1px solid rgba(0,255,255,.2);
border-radius:20px;
padding:40px;
text-align:center;
font-weight:700;
font-size:1.2rem;
box-shadow:0 0 15px rgba(0,255,255,.08);
}
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}
.card{
background:#121212;
border-radius:18px;
overflow:hidden;
border:1px solid rgba(0,255,255,.15);
transition:.3s;
cursor:pointer;
}
.card:hover{
transform:translateY(-5px);
box-shadow:0 0 18px rgba(0,255,255,.2);
}
.card img{
width:100%;
height:220px;
object-fit:cover;
}
.card-content{
padding:15px;
}
.card h3{
font-size:1rem;
margin-bottom:10px;
}
.price{
font-weight:700;
color:#00ffff;
font-size:1.2rem;
}
.add-card{
display:flex;
align-items:center;
justify-content:center;
font-size:5rem;
color:#00ffff;
min-height:330px;
}
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:1000;
}
.modal-content{
background:#121212;
width:100%;
max-width:500px;
border-radius:20px;
padding:25px;
border:1px solid rgba(0,255,255,.2);
max-height:90vh;
overflow:auto;
}
.modal-content h2{
margin-bottom:20px;
color:#00ffff;
}
.modal-content input,
.modal-content textarea,
.modal-content select{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:12px;
background:#1b1b1b;
color:white;
}
.save-btn{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:#00ffff;
font-weight:700;
cursor:pointer;
}
.product-view img{
width:100%;
border-radius:20px;
margin-bottom:20px;
}
.flavors{
margin:20px 0;
color:#ccc;
white-space:pre-line;
}
.whatsapp{
display:block;
text-align:center;
padding:16px;
border-radius:15px;
background:#00c853;
color:white;
text-decoration:none;
font-weight:700;
margin-top:20px;
}
.close{
float:right;
cursor:pointer;
font-size:1.5rem;
color:#00ffff;
}
.admin-btn{
position:fixed;
bottom:20px;
right:20px;
background:#00ffff;
color:black;
padding:14px 20px;
border-radius:40px;
font-weight:700;
cursor:pointer;
box-shadow:0 0 20px rgba(0,255,255,.4);
z-index:999;
}
footer{
padding:40px;
text-align:center;
color:#777;
}
</style>
</head>
<body>

<header>
<h1 class="logo">STREET PUFFS</h1>
<p class="subtitle">PREMIUM VAPERS & ACCESORIOS</p>
<button class="btn" onclick="document.getElementById('catalogo').scrollIntoView()">VER PRODUCTOS</button>
</header>

<section class="section" id="catalogo">
<h2 class="title">Categorías</h2>

<div class="categories">
<div class="category">VAPERS</div>
<div class="category">ACCESORIOS IPHONE</div>
</div>

<h2 class="title">Productos</h2>

<div class="products" id="products"></div>
</section>

<div class="modal" id="adminModal">
<div class="modal-content">
<span class="close" onclick="closeAdmin()">&times;</span>
<h2>Agregar producto</h2>

<input type="text" id="name" placeholder="Nombre del producto">

<input type="text" id="price" placeholder="Precio">

<input type="text" id="image" placeholder="URL de imagen">

<textarea id="description" rows="5" placeholder="Sabores o descripción"></textarea>

<select id="category">
<option>Vapers</option>
<option>Accesorios iPhone</option>
</select>

<button class="save-btn" onclick="saveProduct()">GUARDAR PRODUCTO</button>
</div>
</div>

<div class="modal" id="productModal">
<div class="modal-content product-view" id="productContent"></div>
</div>

<div class="admin-btn" onclick="loginAdmin()">ADMIN</div>

<footer>
© 2026 Street Puffs
</footer>

<script>
let admin = false;

const defaultProducts = [];
if(!localStorage.getItem("products")){
localStorage.setItem("products",JSON.stringify(defaultProducts));
}

function getProducts(){
return JSON.parse(localStorage.getItem("products"));
}

function renderProducts(){
const container = document.getElementById("products");
container.innerHTML = "";

getProducts().forEach((product,index)=>{
container.innerHTML += `
<div class="card" onclick="openProduct(${index})">
<img src="${product.image}">
<div class="card-content">
<h3>${product.name}</h3>
<div class="price">${product.price}</div>
</div>
</div>
`;
});

if(admin){
container.innerHTML += `
<div class="card add-card" onclick="openAdmin()">
+
</div>
`;
}
}

function loginAdmin(){
const pass = prompt("Ingresar contraseña admin");
if(pass === "street123"){
admin = true;
renderProducts();
alert("Modo administrador activado");
}else{
alert("Contraseña incorrecta");
}
}

function openAdmin(){
document.getElementById("adminModal").style.display = "flex";
}

function closeAdmin(){
document.getElementById("adminModal").style.display = "none";
}

function saveProduct(){
const product = {
name:document.getElementById("name").value,
price:document.getElementById("price").value,
image:document.getElementById("image").value,
description:document.getElementById("description").value,
category:document.getElementById("category").value
};

const products = getProducts();
products.push(product);

localStorage.setItem("products",JSON.stringify(products));

closeAdmin();
renderProducts();

alert("Producto agregado");
}

function openProduct(index){
const product = getProducts()[index];

document.getElementById("productContent").innerHTML = `
<span class="close" onclick="closeProduct()">&times;</span>
<img src="${product.image}">
<h2>${product.name}</h2>

<div class="flavors">${product.description}</div>

<div class="price">${product.price}</div>

<a class="whatsapp"
href="https://api.whatsapp.com/send?phone=5493814157720text=Hola,%20quiero%20consultar%20por%20${encodeURIComponent(product.name)}"
target="_blank">
Consultar por WhatsApp
</a>
`;

document.getElementById("productModal").style.display = "flex";
}

function closeProduct(){
document.getElementById("productModal").style.display = "none";
}

renderProducts();

  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
</script>
</script>

</body>
</html>
