
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Street Puffs</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
scroll-behavior:smooth;
}

body{
background:
radial-gradient(circle at top,#1a1a1a 0%,#090909 40%,#000 100%);
color:white;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
width:600px;
height:600px;
background:#00ffff15;
filter:blur(140px);
top:-200px;
right:-200px;
z-index:-1;
}

body::after{
content:"";
position:fixed;
width:500px;
height:500px;
background:#0066ff10;
filter:blur(140px);
bottom:-200px;
left:-200px;
z-index:-1;
}

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
position:relative;
}

.logo-img{
width:320px;
max-width:90%;
filter:drop-shadow(0 0 25px rgba(0,255,255,.25));
animation:fadeUp 1s ease;
}

.subtitle{
margin-top:15px;
letter-spacing:5px;
color:#9d9d9d;
font-size:1rem;
animation:fadeUp 1.2s ease;
}

.btn{
margin-top:45px;
padding:18px 42px;
border:none;
border-radius:60px;
background:linear-gradient(90deg,#00ffff,#0099ff);
color:white;
font-weight:700;
font-size:1rem;
cursor:pointer;
transition:.35s;
box-shadow:
0 0 30px rgba(0,255,255,.25),
0 0 60px rgba(0,255,255,.08);
animation:fadeUp 1.4s ease;
}

.btn:hover{
transform:translateY(-4px) scale(1.03);
box-shadow:
0 0 40px rgba(0,255,255,.45),
0 0 80px rgba(0,255,255,.12);
}

.section{
padding:90px 20px;
max-width:1400px;
margin:auto;
}

.title{
font-size:2.3rem;
margin-bottom:35px;
font-weight:800;
letter-spacing:2px;
color:white;
}

.categories{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:25px;
margin-bottom:60px;
}

.category{
background:rgba(255,255,255,.04);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
border-radius:28px;
padding:45px 20px;
text-align:center;
font-weight:700;
font-size:1.1rem;
cursor:pointer;
transition:.35s;
position:relative;
overflow:hidden;
}

.category::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(90deg,#00ffff22,transparent);
opacity:0;
transition:.35s;
}

.category:hover::before{
opacity:1;
}

.category:hover{
transform:translateY(-6px);
border-color:#00ffff55;
box-shadow:
0 0 30px rgba(0,255,255,.08);
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:28px;
}

.card{
background:rgba(255,255,255,.04);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.06);
border-radius:28px;
overflow:hidden;
cursor:pointer;
transition:.4s;
position:relative;
animation:fadeCard .5s ease;
}

.card::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(
180deg,
rgba(255,255,255,.08),
transparent
);
opacity:.5;
pointer-events:none;
}
.card:hover{
transform:translateY(-8px);
border-color:#00ffff55;
box-shadow:
0 10px 40px rgba(0,255,255,.12);
}

.card img{
width:100%;
height:260px;
object-fit:cover;
transition:.5s;
filter:saturate(1.1) contrast(1.05);
}

.card:hover img{
transform:scale(1.06);
}

.card-content{
padding:20px;
}

.card h3{
font-size:1.05rem;
margin-bottom:12px;
font-weight:700;
}

.price{
font-size:1.3rem;
font-weight:800;
background:linear-gradient(90deg,#00ffff,#00a2ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.add-card{
display:flex;
justify-content:center;
align-items:center;
min-height:360px;
background:rgba(0,255,255,.05);
border:2px dashed rgba(0,255,255,.3);
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
backdrop-filter:blur(10px);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:1000;
}

.modal-content{
background:#111;
border:1px solid rgba(255,255,255,.08);
width:100%;
max-width:520px;
border-radius:30px;
padding:28px;
max-height:90vh;
overflow:auto;
box-shadow:
0 0 40px rgba(0,0,0,.45);
}

.modal-content h2{
margin-bottom:20px;
font-size:1.8rem;
}

.modal-content input,
.modal-content textarea,
.modal-content select{
width:100%;
padding:16px;
margin-bottom:15px;
border:none;
border-radius:16px;
background:#1a1a1a;
color:white;
font-size:1rem;
outline:none;
border:1px solid transparent;
transition:.3s;
}

.modal-content input:focus,
.modal-content textarea:focus,
.modal-content select:focus{
border-color:#00ffff88;
box-shadow:0 0 15px rgba(0,255,255,.15);
}

.save-btn{
width:100%;
padding:16px;
border:none;
border-radius:18px;
background:linear-gradient(90deg,#00ffff,#0099ff);
color:white;
font-weight:800;
font-size:1rem;
cursor:pointer;
transition:.3s;
}

.save-btn:hover{
transform:translateY(-2px);
}

.product-view img{
width:100%;
border-radius:24px;
margin-bottom:20px;
}

.flavors{
margin:20px 0;
color:#cfcfcf;
line-height:1.7;
white-space:pre-line;
}

.whatsapp{
display:block;
text-align:center;
padding:17px;
border-radius:18px;
background:linear-gradient(90deg,#00c853,#00e676);
color:white;
text-decoration:none;
font-weight:800;
margin-top:22px;
transition:.3s;
}

.whatsapp:hover{
transform:translateY(-2px);
}

.close{
float:right;
cursor:pointer;
font-size:1.7rem;
color:#00ffff;
}

.admin-btn{
position:fixed;
right:20px;
padding:15px 22px;
border-radius:60px;
font-weight:800;
cursor:pointer;
z-index:999;
backdrop-filter:blur(10px);
transition:.3s;
border:1px solid rgba(255,255,255,.08);
}

.admin-btn{
background:linear-gradient(90deg,#00ffff,#0099ff);
color:white;
box-shadow:0 0 25px rgba(0,255,255,.25);
bottom:20px;
}

.admin-btn[style]{
box-shadow:0 0 25px rgba(255,0,0,.18);
}

.admin-btn:hover{
transform:translateY(-3px) scale(1.04);
}
footer{
padding:50px;
text-align:center;
color:#777;
font-size:.9rem;
}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes fadeCard{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}
</style>
</head>
<body>

<header>
<img 
src="https://imgur.com/a/3ev3sk7#u1Ijkwi"
class="logo-img"
ondblclick="showAdminButton()"
>
<p class="subtitle">PREMIUM VAPERS & ACCESORIOS</p>
<button class="btn" onclick="document.getElementById('catalogo').scrollIntoView()">VER PRODUCTOS</button>
</header>

<section class="section" id="catalogo">
<h2 class="title">Categorías</h2>

<div class="categories">

<div class="category" onclick="filterCategory('Todos')">
TODOS
</div>

<div class="category" onclick="filterCategory('Vapers')">
VAPERS
</div>

<div class="category" onclick="filterCategory('Accesorios iPhone')">
ACCESORIOS IPHONE
</div>

</div>

<h2 class="title">Productos</h2>

<div class="products" id="products"></div>
</section>

<div class="modal" id="adminModal">
<div class="modal-content">
<span class="close" onclick="closeAdmin()">&times;</span>
<h2>Agregar producto</h2>

<input type="text" id="name" placeholder="Nombre del producto">

<input type="text" id="price" placeholder="Precio">

<input type="text" id="image" placeholder="URL de imagen">

<textarea id="description" rows="5" placeholder="Sabores o descripción"></textarea>

<select id="category">
<option>Vapers</option>
<option>Accesorios iPhone</option>
</select>

<button class="save-btn" onclick="saveProduct()">GUARDAR PRODUCTO</button>
</div>
</div>

<div class="modal" id="productModal">
<div class="modal-content product-view" id="productContent"></div>
</div>

<div 
class="admin-btn" 
id="adminButton"
onclick="loginAdmin()"
style="display:none;">
ADMIN
</div>
<div 
class="admin-btn"
id="logoutButton"
style="bottom:80px;background:red;color:white;display:none;"
onclick="logoutAdmin()">
SALIR
</div>

<footer>
© 2026 Street Puffs
</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyCN6YuuMw7q8QY1SfBQj4aADOFLKk_AMVk",
  authDomain: "street-puffs-9546f.firebaseapp.com",
  projectId: "street-puffs-9546f",
  storageBucket: "street-puffs-9546f.firebasestorage.app",
  messagingSenderId: "544227766279",
  appId: "1:544227766279:web:21d28d3c668736a90e7aa2",
  measurementId: "G-4VWG2XW150"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let admin = localStorage.getItem("admin") === "true";
if(localStorage.getItem("adminVisible") === "true"){
  document.getElementById("adminButton").style.display = "block";
}

if(admin){
  document.getElementById("logoutButton").style.display = "block";
}
let currentCategory = "Todos";
let editingProductId = null;

async function loadProducts(){

const container = document.getElementById("products");

container.innerHTML = "";

const querySnapshot = await getDocs(collection(db, "products"));

querySnapshot.forEach((firebaseDoc)=>{

const product = firebaseDoc.data();

product.id = firebaseDoc.id;

if(currentCategory !== "Todos" && product.category !== currentCategory){
return;
}

container.innerHTML += `
<div class="card" onclick='openProduct(${JSON.stringify(product)})'>
<img src="${product.image}">
<div class="card-content">
<h3>${product.name}</h3>
<div class="price">${product.price}</div>
</div>
</div>
`;

});

if(admin){

container.innerHTML += `
<div class="card add-card" onclick="openAdmin()">
+
</div>
`;

}

}
window.showAdminButton = function(){

document.getElementById("adminButton").style.display = "block";

setTimeout(()=>{
document.getElementById("adminButton").style.display = "none";
},10000);

}
window.loginAdmin = function(){

const pass = prompt("Ingresar contraseña admin");

if(pass === "street123"){

admin = true;

localStorage.setItem("admin", "true");
document.getElementById("logoutButton").style.display = "block";

loadProducts();

alert("Modo administrador activado");

}else{

alert("Contraseña incorrecta");

}

}
window.logoutAdmin = function(){

admin = false;

localStorage.removeItem("admin");
document.getElementById("logoutButton").style.display = "none";
document.getElementById("adminButton").style.display = "none";

loadProducts();

alert("Modo administrador desactivado");

}

window.openAdmin = function(){

document.getElementById("adminModal").style.display = "flex";

}

window.closeAdmin = function(){

document.getElementById("adminModal").style.display = "none";

document.getElementById("name").value = "";

document.getElementById("price").value = "";

document.getElementById("image").value = "";

document.getElementById("description").value = "";

document.getElementById("category").value = "Vapers";

document.querySelector(".save-btn").innerText = "GUARDAR PRODUCTO";

editingProductId = null;

}

window.saveProduct = async function(){

if(window.savingProduct) return;

window.savingProduct = true;

const product = {

name:document.getElementById("name").value,
price:document.getElementById("price").value,
image:document.getElementById("image").value,
description:document.getElementById("description").value,
category:document.getElementById("category").value

};

if(editingProductId){

await updateDoc(
doc(db, "products", editingProductId),
product
);

alert("Producto actualizado");

editingProductId = null;

}else{

await addDoc(collection(db, "products"), product);

alert("Producto agregado");

}

closeAdmin();

loadProducts();

window.savingProduct = false;

}

window.editProduct = function(product){

editingProductId = product.id;

document.querySelector(".save-btn").innerText = "GUARDAR CAMBIOS";

document.getElementById("name").value = product.name;

document.getElementById("price").value = product.price;

document.getElementById("image").value = product.image;

document.getElementById("description").value = product.description;

document.getElementById("category").value = product.category;

openAdmin();

closeProduct();

}

window.openProduct = function(product){

document.getElementById("productContent").innerHTML = `
<span class="close" onclick="closeProduct()">&times;</span>

<img 
src="${product.image}" 
onerror="this.src='https://i.imgur.com/8Km9tLL.png'"
>

<h2>${product.name}</h2>

<div class="flavors">${product.description}</div>

<div class="price">${product.price}</div>

${admin ? `

<button
onclick='editProduct(${JSON.stringify(product)})'
style="
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:15px;
background:#ff9800;
color:white;
font-weight:700;
cursor:pointer;
">
EDITAR PRODUCTO
</button>

<button
onclick="deleteProduct('${product.id}')"
style="
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:15px;
background:red;
color:white;
font-weight:700;
cursor:pointer;
">
ELIMINAR PRODUCTO
</button>
` : ""}

<a class="whatsapp"
href="https://api.whatsapp.com/send?phone=5493814157720&text=Hola,%20quiero%20consultar%20por%20${encodeURIComponent(product.name)}"
target="_blank">

Consultar por WhatsApp

</a>
`;

document.getElementById("productModal").style.display = "flex";

}

window.closeProduct = function(){

document.getElementById("productModal").style.display = "none";

}

window.deleteProduct = async function(id){

const confirmar = confirm("Eliminar producto?");

if(!confirmar) return;

await deleteDoc(doc(db, "products", id));

closeProduct();

loadProducts();

alert("Producto eliminado");

}

window.filterCategory = function(category){

currentCategory = category;

loadProducts();

}

loadProducts();

</script>

</body>
</html>
