
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Street Puffs</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
scroll-behavior:smooth;
}

body{
background:
radial-gradient(circle at top,#0f1720 0%,#070b10 45%,#000000 100%);
color:white;
overflow-x:hidden;
}

/* fondos decorativos */

body::before{
content:"";
position:fixed;
width:700px;
height:700px;
background:#00e5ff18;
filter:blur(160px);
top:-250px;
right:-250px;
z-index:-1;
}

body::after{
content:"";
position:fixed;
width:600px;
height:600px;
background:#0077ff12;
filter:blur(160px);
bottom:-250px;
left:-250px;
z-index:-1;
}

/* HEADER */

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
position:relative;
}

.logo-img{
width:500px;
max-width:95%;

filter:
drop-shadow(0 0 25px rgba(0,229,255,.35))
drop-shadow(0 0 55px rgba(0,229,255,.15));

animation:
fadeUp 1s ease,
floatLogo 4s ease-in-out infinite;

transition:.4s;
}

.logo-img:hover{
transform:scale(1.03);
}

.subtitle{
margin-top:18px;
letter-spacing:6px;
color:#b8c7d1;
font-size:1rem;
font-weight:500;
animation:fadeUp 1.2s ease;
text-shadow:0 0 12px rgba(255,255,255,.08);
}

/* BOTÓN */

.btn{
margin-top:45px;
padding:18px 55px;
border:none;
border-radius:60px;
background:linear-gradient(135deg,#00e5ff,#0077ff);
color:white;
font-weight:800;
font-size:1rem;
cursor:pointer;
transition:.4s;
letter-spacing:1px;
position:relative;
overflow:hidden;

box-shadow:
0 0 30px rgba(0,229,255,.35),
0 0 80px rgba(0,132,255,.18);
}

.btn::before{
content:"";
position:absolute;
top:0;
left:-120%;
width:100%;
height:100%;
background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,.35),
transparent
);

transition:.6s;
}

.btn:hover::before{
left:120%;
}

.btn:hover{
transform:translateY(-4px) scale(1.05);
}

/* SECCIONES */

.section{
padding:90px 20px;
max-width:1400px;
margin:auto;
}

.title{
font-size:2.5rem;
margin-bottom:40px;
font-weight:900;
letter-spacing:3px;
color:white;
text-shadow:0 0 20px rgba(0,229,255,.15);
}

/* CATEGORÍAS */

.categories{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:25px;
margin-bottom:60px;
}

.category{
background:rgba(255,255,255,.035);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.07);
border-radius:26px;
padding:38px 20px;
text-align:center;
font-weight:800;
font-size:1rem;
letter-spacing:1px;
cursor:pointer;
transition:.35s;
position:relative;
overflow:hidden;
}

.category::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(90deg,#00ffff22,transparent);
opacity:0;
transition:.35s;
}

.category:hover::before{
opacity:1;
}

.category:hover{
transform:translateY(-6px) scale(1.02);
border-color:#00e5ff88;
box-shadow:
0 10px 35px rgba(0,229,255,.14);
}

.category.active{

background:
linear-gradient(
135deg,
rgba(0,229,255,.30),
rgba(0,119,255,.24)
);

border-color:#00ffff;

color:#ffffff;

transform:
translateY(-4px)
scale(1.03);

box-shadow:
0 0 12px rgba(0,229,255,.35),
0 0 30px rgba(0,229,255,.25),
0 0 60px rgba(0,119,255,.18);

}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:28px;
}

/* CARD */

.card{
background:
linear-gradient(
180deg,
rgba(255,255,255,.08),
rgba(255,255,255,.03)
);

opacity:0;
transform:translateY(20px);

backdrop-filter:blur(25px);
-webkit-backdrop-filter:blur(25px);

border:1px solid rgba(255,255,255,.08);

border-radius:32px;
overflow:hidden;
cursor:pointer;
transition:.25s;
position:relative;

box-shadow:
0 10px 30px rgba(0,0,0,.35),
0 0 20px rgba(0,229,255,.04);

}

.card::before{
content:"";
position:absolute;
inset:0;

background:
linear-gradient(
135deg,
rgba(255,255,255,.12),
transparent 35%
);

opacity:.8;
pointer-events:none;
}

.card::after{
content:"";
position:absolute;
inset:-2px;

background:
linear-gradient(
135deg,
transparent,
rgba(0,229,255,.22),
transparent,
rgba(91,140,255,.18),
transparent
);

border-radius:34px;

opacity:0;

transition:.5s;

z-index:-1;
filter:blur(18px);
}

.card:hover{
transform:
translateY(-10px)
scale(1.02);

border-color:#00e5ff88;

box-shadow:
0 25px 60px rgba(0,229,255,.18),
0 0 35px rgba(0,229,255,.12);
}

.card:hover::after{
opacity:1;
}

.card img{
width:100%;
height:280px;
object-fit:cover;
transition:.35s;

filter:
saturate(1.15)
contrast(1.08)
brightness(.98);

opacity:0;
animation:imageFade .8s ease forwards;
}

.card:hover img{
transform:scale(1.1);
}

.card-content{
padding:20px;
}

.card h3{
font-size:1.05rem;
margin-bottom:12px;
font-weight:700;
}

.price{
font-size:1.45rem;
font-weight:900;
background:linear-gradient(135deg,#00e5ff,#5b8cff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
letter-spacing:.5px;
}

/* CARD AGREGAR */

.add-card{
display:flex;
justify-content:center;
align-items:center;
font-size:5rem;
min-height:360px;
background:rgba(0,255,255,.05);
border:2px dashed rgba(0,255,255,.3);
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
backdrop-filter:blur(10px);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:1000;
}

.modal-content{
background:rgba(10,10,10,.96);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,.08);
width:100%;
max-width:520px;
border-radius:34px;
padding:30px;
max-height:90vh;
overflow:auto;
}
.product-view{
animation:productModal .45s cubic-bezier(.2,.8,.2,1);
transform-origin:center;
}

@keyframes productModal{

from{
opacity:0;
transform:
scale(.92)
translateY(30px);
filter:blur(10px);
}

to{
opacity:1;
transform:
scale(1)
translateY(0);
filter:blur(0);
}

}
/* INPUTS */

.modal-content input,
.modal-content textarea,
.modal-content select{
width:100%;
padding:16px;
margin-bottom:15px;
border:none;
border-radius:16px;
background:#1a1a1a;
color:white;
font-size:1rem;
}

/* BOTÓN GUARDAR */

.save-btn{
width:100%;
padding:16px;
border:none;
border-radius:18px;
background:linear-gradient(90deg,#00ffff,#0099ff);
color:white;
font-weight:800;
font-size:1rem;
cursor:pointer;
}

/* WHATSAPP */

.whatsapp{
display:block;
text-align:center;
padding:17px;
border-radius:18px;
background:linear-gradient(90deg,#00c853,#00e676);
color:white;
text-decoration:none;
font-weight:800;
margin-top:22px;
}
.whatsapp:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(0,255,120,.25);
}

.close:hover{
opacity:.7;
}
.product-view img{
width:100%;
height:320px;
object-fit:cover;
border-radius:24px;
margin-bottom:20px;
}

.product-view h2{
font-size:1.8rem;
margin-bottom:15px;
font-weight:800;
}

.flavors{
margin:20px 0;
color:#cfcfcf;
line-height:1.7;
white-space:pre-line;
font-size:1rem;
}

.product-view .price{
margin-top:10px;
font-size:1.7rem;
display:block;
}
/* BOTÓN ADMIN */

.admin-btn{
position:fixed;
right:20px;
padding:15px 22px;
border-radius:60px;
font-weight:800;
cursor:pointer;
z-index:999;
backdrop-filter:blur(10px);
transition:.3s;
border:1px solid rgba(255,255,255,.08);

background:linear-gradient(90deg,#00ffff,#0099ff);
color:white;

box-shadow:
0 0 25px rgba(0,255,255,.25);

bottom:20px;
}

.admin-btn:hover{
transform:translateY(-3px) scale(1.04);
}

/* CLOSE */

.close{
float:right;
cursor:pointer;
font-size:1.7rem;
color:#00ffff;
}

/* TOAST */

.toast{
position:fixed;
left:50%;
bottom:30px;
transform:translateX(-50%) translateY(120px);

background:
linear-gradient(
135deg,
rgba(0,255,255,.18),
rgba(0,120,255,.18)
);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.12);

padding:16px 28px;

border-radius:18px;

color:white;
font-weight:700;
letter-spacing:.5px;

z-index:5000;

opacity:0;

transition:.25s;

box-shadow:
0 10px 35px rgba(0,229,255,.2);
}

.toast.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

/* FOOTER */

footer{
padding:50px;
text-align:center;
color:#777;
font-size:.9rem;
}

/* ANIMACIONES */

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes fadeCard{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes floatLogo{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-10px);
}

100%{
transform:translateY(0);
}

}

@keyframes imageFade{

from{
opacity:0;
transform:scale(1.08);
}

to{
opacity:1;
transform:scale(1);
}

}

.card.show{
opacity:1;
transform:translateY(0);
will-change: transform, opacity;
}

</style>
</head>

<body>
<header>
<img 
src="https://i.imgur.com/f4pVPlZ.png"
class="logo-img"
ondblclick="showAdminButton()"
>

<p class="subtitle">
PREMIUM VAPERS & ACCESORIOS
</p>

<button class="btn"
onclick="scrollCatalogo()">
VER PRODUCTOS
</button>
</header>

<section class="section" id="catalogo">

<h2 class="title">Categorías</h2>

<div class="categories">

<div class="category" onclick="filterCategory('Todos')">
TODOS
</div>

<div class="category" onclick="filterCategory('Vapers')">
VAPERS
</div>

<div class="category" onclick="filterCategory('Accesorios iPhone')">
ACCESORIOS IPHONE
</div>

</div>

<h2 class="title">Productos</h2>

<div class="products" id="products"></div>

</section>
<div class="modal" id="adminModal">
<div class="modal-content">
<span class="close" onclick="closeAdmin()">&times;</span>

<h2>Agregar producto</h2>

<input type="text" id="name" placeholder="Nombre del producto">

<input type="text" id="price" placeholder="Precio">

<input type="text" id="image" placeholder="URL de imagen">

<textarea id="description" rows="5" placeholder="Sabores o descripción"></textarea>

<select id="category">
<option>Vapers</option>
<option>Accesorios iPhone</option>
</select>

<button class="save-btn" onclick="saveProduct()">
GUARDAR PRODUCTO
</button>
</div>
</div>

<div class="modal" id="productModal">
<div class="modal-content product-view" id="productContent"></div>
</div>

<div
class="admin-btn"
id="adminButton"
onclick="loginAdmin()"
style="display:none;">
ADMIN
</div>

<div
class="admin-btn"
id="logoutButton"
style="bottom:80px;background:red;color:white;display:none;"
onclick="logoutAdmin()">
SALIR
</div>

<div class="toast" id="toast"></div>

<footer>
© 2026 Street Puffs
</footer>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCN6YuuMw7q8QY1SfBQj4aADOFLKk_AMVk",
  authDomain: "street-puffs-9546f.firebaseapp.com",
  projectId: "street-puffs-9546f",
  storageBucket: "street-puffs-9546f.firebasestorage.app",
  messagingSenderId: "544227766279",
  appId: "1:544227766279:web:21d28d3c668736a90e7aa2",
  measurementId: "G-4VWG2XW150"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let admin = localStorage.getItem("admin") === "true";

if(admin){
  document.getElementById("logoutButton").style.display = "block";
}

let currentCategory = "Todos";
let editingProductId = null;

async function loadProducts(){

const container = document.getElementById("products");

container.innerHTML = "";

const querySnapshot = await getDocs(collection(db, "products"));

querySnapshot.forEach((firebaseDoc)=>{

const product = firebaseDoc.data();

product.id = firebaseDoc.id;

if(currentCategory !== "Todos" && product.category !== currentCategory){
return;
}

container.innerHTML += `
<div class="card" onclick='openProduct(${JSON.stringify(product)})'>

<img src="${product.image}">

<div class="card-content">
<h3>${product.name}</h3>
<div class="price">${product.price}</div>
</div>

</div>
`;

});

if(admin){

container.innerHTML += `
<div class="card add-card" onclick="openAdmin()">
+
</div>
`;

}
const observer = new IntersectionObserver((entries)=>{

entries.forEach((entry)=>{

if(entry.isIntersecting){

entry.target.classList.add("show");

}

});

},{
threshold:.15
});
document.querySelectorAll(".card").forEach((card,index)=>{

card.style.transitionDelay = `${index * 0.02}s`;

observer.observe(card);

});

}

function showToast(message){

const toast = document.getElementById("toast");

toast.textContent = message;

toast.classList.add("show");

setTimeout(()=>{

toast.classList.remove("show");

},2500);

}

window.showAdminButton = function(){

document.getElementById("adminButton").style.display = "block";

setTimeout(()=>{

document.getElementById("adminButton").style.display = "none";

},10000);

}

window.loginAdmin = function(){

const pass = prompt("Ingresar contraseña admin");

if(pass === "street123"){

admin = true;

localStorage.setItem("admin","true");

document.getElementById("logoutButton").style.display = "block";

loadProducts();

showToast("Modo administrador activado");

}else{

showToast("Contraseña incorrecta");

}

}

window.logoutAdmin = function(){

admin = false;

localStorage.removeItem("admin");

document.getElementById("logoutButton").style.display = "none";

document.getElementById("adminButton").style.display = "none";

loadProducts();

showToast("Sesión cerrada");

}

window.openAdmin = function(){

document.getElementById("adminModal").style.display = "flex";

}

window.closeAdmin = function(){

document.getElementById("adminModal").style.display = "none";

document.getElementById("name").value = "";

document.getElementById("price").value = "";

document.getElementById("image").value = "";

document.getElementById("description").value = "";

document.getElementById("category").value = "Vapers";

editingProductId = null;

}

window.saveProduct = async function(){

if(window.savingProduct) return;

window.savingProduct = true;

const product = {

name:document.getElementById("name").value,
price:document.getElementById("price").value,
image:document.getElementById("image").value,
description:document.getElementById("description").value,
category:document.getElementById("category").value

};

if(editingProductId){

await updateDoc(
doc(db,"products",editingProductId),
product
);

showToast("Producto actualizado ✓");

editingProductId = null;

}else{

await addDoc(collection(db,"products"),product);

showToast("Producto agregado ✓");

}

closeAdmin();

loadProducts();

window.savingProduct = false;

}

window.editProduct = function(product){

editingProductId = product.id;

document.getElementById("name").value = product.name;

document.getElementById("price").value = product.price;

document.getElementById("image").value = product.image;

document.getElementById("description").value = product.description;

document.getElementById("category").value = product.category;

openAdmin();

closeProduct();

}

window.openProduct = function(product){

document.getElementById("productContent").innerHTML = `

<span class="close" onclick="closeProduct()">&times;</span>

<img 
src="${product.image}"
onerror="this.src='https://i.imgur.com/8Km9tLL.png'"
>

<h2>${product.name}</h2>

<div class="flavors">
${product.description}
</div>

<div class="price">
${product.price}
</div>

${admin ? `

<button
onclick='editProduct(${JSON.stringify(product)})'
style="
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:15px;
background:#ff9800;
color:white;
font-weight:700;
cursor:pointer;
">
EDITAR PRODUCTO
</button>

<button
onclick="deleteProduct('${product.id}')"
style="
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:15px;
background:red;
color:white;
font-weight:700;
cursor:pointer;
">
ELIMINAR PRODUCTO
</button>

` : ""}

<a
class="whatsapp"
href="https://api.whatsapp.com/send?phone=5493814157720&text=Hola,%20quiero%20consultar%20por%20${encodeURIComponent(product.name)}"
target="_blank">

Consultar por WhatsApp

</a>
`;

document.getElementById("productModal").style.display = "flex";

}

window.closeProduct = function(){

document.getElementById("productModal").style.display = "none";

}

window.deleteProduct = async function(id){

const confirmar = confirm("Eliminar producto?");

if(!confirmar) return;

await deleteDoc(doc(db,"products",id));

closeProduct();

loadProducts();

showToast("Producto eliminado");

}

window.filterCategory = function(category){

currentCategory = category;

document.querySelectorAll(".category").forEach((btn)=>{

btn.classList.remove("active");

const text = btn.textContent.trim();

if(
(category === "Todos" && text === "TODOS")
||
(category === "Vapers" && text === "VAPERS")
||
(category === "Accesorios iPhone" && text === "ACCESORIOS IPHONE")
){

btn.classList.add("active");

}

});

loadProducts();

}

window.scrollCatalogo = function(){

document.getElementById("catalogo").scrollIntoView({
behavior:"smooth",
block:"start"
});

}

loadProducts();

document.querySelector(".category").classList.add("active");

</script>
</body>
</html>
